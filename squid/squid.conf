# IPv4-only HTTP Port (IPv6 disabled)
http_port 0.0.0.0:3128 ipv4

# Basic Auth gegen /etc/squid/passwd
auth_param basic program /usr/lib/squid/basic_ncsa_auth /etc/squid/passwd
auth_param basic realm Squid Proxy
acl authenticated proxy_auth REQUIRED
acl allowed_domains dstdomain "/etc/squid/allowed_domains.txt"
acl SSL_ports port 443
acl Safe_ports port 80 443
acl CONNECT method CONNECT

# Verhindert CONNECT zu unsicheren/ungewollten Ports
http_access deny CONNECT !SSL_ports
http_access deny !Safe_ports
http_access allow authenticated allowed_domains
http_access deny all

# Erzwungene Upstream-Kette: Squid -> Privoxy (localhost)
# Zwei Privoxy-Wege mit Round-Robin (jeweils eigener Tor-Weg)
cache_peer 127.0.0.1 parent 8118 0 no-query no-delay round-robin name=privoxy1
cache_peer 127.0.0.2 parent 8128 0 no-query no-delay round-robin name=privoxy2
cache_peer_access privoxy1 allow all
cache_peer_access privoxy2 allow all
never_direct allow all

# Timeout-Einstellungen für Tor/Privoxy (langsamer via Tor - Circuit-Aufbau braucht Zeit)
connect_timeout 90 seconds
peer_connect_timeout 90 seconds
read_timeout 180 seconds
request_timeout 200 seconds

# High-Anonymous Profil: keine Proxy-Identitaet nach aussen leaken
via off
forwarded_for delete
follow_x_forwarded_for deny all
request_header_access Proxy deny all
request_header_access Proxy-Authorization deny all
request_header_access Proxy-Connection deny all
request_header_access X-Forwarded-For deny all
request_header_access Forwarded deny all
request_header_access Via deny all
request_header_access From deny all
reply_header_access Via deny all
reply_header_access X-Cache deny all
reply_header_access X-Cache-Lookup deny all
reply_header_access Server deny all
reply_header_access X-Powered-By deny all
httpd_suppress_version_string on
visible_hostname anonymous-proxy

# User-Agent Spoofing zur erhöhten Anonymität
request_header_replace User-Agent "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36"
request_header_replace Accept-Language "en-US,en;q=0.9"
request_header_replace Accept-Encoding "gzip, deflate, br"

cache deny all
access_log stdio:/var/log/squid/access.log
cache_log stdio:/var/log/squid/cache.log
pid_filename /var/run/squid/squid.pid
